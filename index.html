<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/hnam.svg" />

    <!-- Viewport - Mobile Optimized -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes"
    />

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#14b8a6" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- SEO Meta Tags -->
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow" />
    <meta name="author" content="HNAM PHIM" />
    <meta name="language" content="Vietnamese" />

    <!-- DNS Prefetch / Preconnect for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://phimimg.com" />
    <link rel="dns-prefetch" href="https://images.weserv.nl" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.weserv.nl" crossorigin />

    <!-- Non-blocking web font load: use preload + onload swap to avoid render-blocking -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      />
    </noscript>

    <!-- LCP image preload: hero featured movie poster (1280 px WebP via weserv proxy) -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="https://images.weserv.nl/?url=phim.nguonc.com%2Fpublic%2Fimages%2FPost%2F7%2Ftieng-yeu-nay-anh-dich-duoc-khong-1.jpg&w=1280&fit=cover&q=80&output=webp&af="
    />

    <title>HNAM PHIM - Xem Phim Online Miễn Phí</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
